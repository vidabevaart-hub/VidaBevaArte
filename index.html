<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Beva Arte</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(180deg,#f6e7e7,#e8f2f1,#ffffff);
  color: #5c4a2d;
  text-align: center;
}

header { padding: 30px; }
header img { width:140px; background:white; padding:10px; border-radius:10px; }
header p { margin:5px 0; font-size:18px; }

nav {
  display:flex; justify-content:center; gap:10px; padding:15px;
  position:sticky; top:0; background:rgba(255,255,255,0.9);
}

nav button {
  padding:10px 18px; border:none; border-radius:25px;
  background:linear-gradient(135deg,#8b6f47,#c8a97e);
  color:white; cursor:pointer;
}

section { display:none; padding:40px 20px; }

.card {
  background:white; border-radius:20px; padding:20px;
  margin:20px auto; max-width:900px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

img { max-width:100%; border-radius:15px; }

/* CARRUSEL PREMIUM */
.carousel-wrapper {
  display:flex;
  justify-content:center;
}

.carousel {
  display:flex;
  gap:20px;
  overflow:hidden;
  max-width:900px;
}

.carousel-track {
  display:flex;
  gap:20px;
  animation: scroll 20s linear infinite;
}

.carousel img {
  width:250px;
  flex:0 0 auto;
  cursor:pointer;
  transition:0.3s;
}

.carousel img:hover {
  transform:scale(1.08);
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* LIGHTBOX */
#lightbox {
  display:none; position:fixed; top:0; left:0;
  width:100%; height:100%; background:rgba(0,0,0,0.8);
  justify-content:center; align-items:center;
}
#lightbox img { max-width:90%; max-height:90%; }

/* GALERIA */
.galeria-menu button {
  margin:5px; padding:10px 16px;
  border-radius:25px; border:none;
  background:#f1ece4;
  transition:0.3s;
}

.galeria-menu button:hover {
  background:#c8a97e;
  color:white;
  transform:scale(1.05);
}

.subgaleria { 
  display:none; 
  margin-top:20px;
  animation: fade 0.5s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);} 
  to {opacity:1; transform:translateY(0);} 
}

.testimonios {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

select,input{padding:8px;margin:5px;border-radius:8px;border:1px solid #ccc;}

.whatsapp {position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;}
</style>
</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/vidabevaart-hub/images/refs/heads/main/logo111.jfif">
<p><b>Arte con intención</b></p>
<p>Convertimos tus recuerdos más especiales en retratos pintados a mano</p>
</header>

<nav>
<button onclick="show('inicio')">Inicio</button>
<button onclick="show('galeria')">Galería</button>
<button onclick="show('precios')">Cotizar</button>
<button onclick="show('nosotros')">Nosotros</button>
<button onclick="show('faq')">Preguntas frecuentes</button>
</nav>

<section id="inicio" style="display:block">

<div class="carousel-wrapper">
<div class="carousel">
<div class="carousel-track">
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio1.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio2.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio3.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://raw.githubusercontent.com/vidabevaart-hub/images/refs/heads/main/inicio6.jfif">

<!-- DUPLICADO PARA LOOP SUAVE -->
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio1.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio2.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://github.com/vidabevaart-hub/images/blob/main/inicio3.jpeg?raw=true">
<img onclick="openImg(this.src)" src="https://raw.githubusercontent.com/vidabevaart-hub/images/refs/heads/main/inicio6.jfif">
</div>
</div>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/vidabevaart-hub/images/refs/heads/main/instaqr.jfif" style="max-width:150px;">
<p>
<a href="https://www.instagram.com/vidabeva.arte" style="color:#5c4a2d;text-decoration:none;">Instagram</a><br>
<a href="https://www.facebook.com/share/1GLTWmyKdc/" style="color:#5c4a2d;text-decoration:none;">Facebook</a>
</p>
</div>

</section>

<!-- RESTO IGUAL -->

<script>
function show(id){
 document.querySelectorAll('section').forEach(s=>s.style.display='none');
 document.getElementById(id).style.display='block';
}

function mostrarGaleria(id){
 document.querySelectorAll('.subgaleria').forEach(g=>g.style.display='none');
 document.getElementById(id).style.display='block';
}

function enviarWhats(){
 let alto=document.getElementById('alto').value;
 let ancho=document.getElementById('ancho').value;
 let url=`https://wa.me/50670918104?text=Hola quiero cotizar un retrato de ${alto}x${ancho}`;
 window.open(url);
}

function openImg(src){
 document.getElementById('lightbox').style.display='flex';
 document.getElementById('lightimg').src=src;
}
</script>

</body>
</html>
